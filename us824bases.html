    { name: "Palikir, Micronesia", lat: 6.9172, lon: 158.1589 },
    { name: "Yaren, Nauru", lat: -0.5477, lon: 166.9248 },

];

// Зураг дээр тэмдэглэх функц
oceaniaCapitals.forEach(city => {
    L.circleMarker([city.lat, city.lon], {
        radius: 1,
        fillColor: "#ff00ff", // Далайн орнуудыг ягаан өнгөөр ялгав
        color: "#fff",
        weight: 0,
        opacity: 0,
        fillOpacity: 1
    })
    .bindTooltip(city.name, { 
        direction: 'top', 
        className: 'city-label' 
    })
    .addTo(map);
});



// 5. STATE BORDER and FILLING. Улсын 3 тэмдэгт ISO 3166-1 alpha-3 кодыг https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3 авна
    fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/MNG.geo.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: { color: '#fff', weight: 0.1, fillColor: "#0066ff", fillOpacity: 0.03 }
            }).addTo(map);
        });


    fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries/UKR.geo.json')
        .then(res => res.json())
        .then(data => {
            L.geoJSON(data, {
                style: { color: '#fff', weight: 0.1, fillColor: "#0066ff", fillOpacity: 0.03 }
            }).addTo(map);
        });



// 6. TIMEZONE VERTICAL LINE and LABEL
    const tzLayers = [];
    for (let offset = -12; offset <= 12; offset++) {
        const lon = offset * 15;
        L.polyline([[90, lon], [-90, lon]], { color: '#f2f2f2', weight: 0.3, dashArray: '2, 10' }).addTo(map);
        
        const label = L.marker([0, lon], {
            icon: L.divIcon({
                className: 'tz-wrap',
                html: `<div class="tz-dynamic-label">
                    <div class="tz-row-utc">UTC ${offset>=0?'+'+offset:offset}</div>
                    <div class="tz-row-date" id="tz-d-${offset}">--- --</div>
                    <div class="tz-row-time" id="tz-t-${offset}">--:--</div>
                </div>`,
                iconSize: [0, 0]
            })
        }).addTo(map);
        
        tzLayers.push({ offset, label });
    }


    
// 7. LEFT BOTTOM TABLE
	const thr = document.getElementById('table-header');
	thr.innerHTML = ""; // Хуучныг цэвэрлэх
	const headers = ["#", "БАЙРШИЛ", "УТГА", "УТГА", "СТАТУС", "УТГА", "УТГА"]; // Баганын нэрс
	headers.forEach(h => thr.innerHTML += `<th>${h}</th>`);

	// Шинэ мөр нэмдэг функц
	function addRow(dataArray) {
    	const tby = document.getElementById('table-body');
    	const tr = document.createElement('tr');
    	dataArray.forEach(text => {
        	const td = document.createElement('td');
        	td.innerText = text;
        	tr.appendChild(td);
    });
    	tby.appendChild(tr); // Шинэ мөр нэмэгдэхэд хүснэгт дээшээ сунана
	}

// Жишээ өгөгдлүүд нэмэх (Энэ мөрүүдийг нэмэх бүрд хүснэгт  тэлнэ)
addRow(["01", "Bahrain", "1:30.456", "25", "Finished", "P1", "1234"]);
addRow(["02", "Jeddah", "1:28.123", "18", "Finished", "P2", "xxx"]);
addRow(["03", "Melbourne", "--:--.---", "0", "Scheduled", "TBD", "kk"]);



// 8. UPDATE LOOP
    function sync() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        
        map.removeLayer(terminator);
        terminator = L.terminator({ fillOpacity: 0.3, color: '#ffffff', weight: 0.1 }).addTo(map);
        
        const north = map.getBounds().getNorth();
        tzLayers.forEach(tz => {
            const zd = new Date(utc + (3600000 * tz.offset));
            const mon = zd.toLocaleString('en-US', { month: 'short' });
            const day = zd.getDate().toString().padStart(2, '0');
            const tim = zd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            document.getElementById(`tz-d-${tz.offset}`).innerText = `${mon} ${day}`;
            document.getElementById(`tz-t-${tz.offset}`).innerText = tim;
           
           
           
 // 9. TIMEZONE LABEL VERTICAL POSITION
            const margin = 1 / Math.pow(2, map.getZoom() - 2); 
            tz.label.setLatLng([north - margin, tz.offset * 15]);
        });

        const p = (n) => n.toString().padStart(2, '0');
        document.getElementById('hud-date').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).replace(/\//g, '.');
        document.getElementById('hud-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
        document.getElementById('hud-time').innerText = `${p(now.getHours())}:${p(now.getMinutes())}`;
    }

    map.on('move zoom', sync);
    setInterval(sync, 1000);
    sync();

</script>
