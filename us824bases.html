        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #0b0e14; }




        /* Central HUD Styling */
		#central-clock-container {
			position: fixed;       /* Дэлгэцийн цонхтой харьцангуй тогтмол байрлана */
			bottom: 20px;          /* Доод талаас авах зай */
			right: 20px;           /* Баруун талаас авах зай */
			z-index: 1000;
			color: #fff;
			pointer-events: none;
			text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
			/* Төвлөрүүлэх шаардлагагүй болсон тул transform-ыг хасав */
		}
        .clock-row { display: flex; align-items: baseline; margin-bottom: 0px; }
        .clock-label { font-size: 20px; color: #fff; width: 150px; text-align: right; margin-right: 10px; }
        .clock-value { font-size: 20px; font-weight: regular; letter-spacing: 1px; }




        /* Time Zone Label Styling */
        .tz-label {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: Center;
            font-size: 11px;
            line-height: 1.2;
            pointer-events: none;
            white-space: nowrap;
        }
        .tz-time { font-weight: regular; color: #5F98D8; font-size: 11px; }
        .tz-date { color: #fff; }
        .tz-zone { color: #eedc83; text-transform: uppercase; letter-spacing: 1px; }




		/* Баруун доод буланд байсан Leaflet логог арилгана */
		.leaflet-control-attribution {
			display: none !important;
		}




        /* Overlay for Day/Night */
        .solar-terminator {
            fill: rgba(0, 0, 0, 0.5);
            stroke: rgba(255, 255, 255, 0.1);
            stroke-width: 1;
        }
		
		
    </style>
</head>

// Сүүдрийн тохируулга
let nightLayers = []; // Гурван давхаргыг хадгалах массив

function updateSolarTerminator() {
    // 1. Өмнөх бүх давхаргуудыг устгах
    nightLayers.forEach(layer => map.removeLayer(layer));
    nightLayers = [];

    const now = new Date();
    const julianDay = (now / 86400000) - (now.getTimezoneOffset() / 1440) + 2440587.5;
    const T = (julianDay - 2451545.0) / 36525;
    const L0 = 280.46646 + 36000.76983 * T;
    const M = 357.52911 + 35999.05029 * T;
    const lambda = L0 + 1.914666 * Math.sin(M * Math.PI / 180);
    const epsilon = 23.43929 - 0.01300 * T;
    const delta = Math.asin(Math.sin(epsilon * Math.PI / 180) * Math.sin(lambda * Math.PI / 180)) * 180 / Math.PI;
    const utcMinutes = now.getUTCHours() * 60 + now.getUTCMinutes();
    const sunLon = 180 - (utcMinutes / 4);

    // 2. Гурван дэлхийд зориулсан offset-ууд
    const offsets = [-360, 0, 360];

    offsets.forEach(offset => {
        const latPoints = [];
        for (let lon = -180; lon <= 180; lon += 2) { // 2 градус тутамд авбал хурд илүү сайн байна
            const lat = Math.atan(-Math.cos((lon - sunLon) * Math.PI / 180) / Math.tan(delta * Math.PI / 180)) * 180 / Math.PI;
            // Тухайн цэг дээр offset-ийг нэмж байна
            latPoints.push([lat, lon + offset]);
        }

        const nightPath = delta > 0 
            ? [[-90, -180 + offset], ...latPoints, [-90, 180 + offset], [-90, -180 + offset]] 
            : [[90, -180 + offset], ...latPoints, [90, 180 + offset], [90, -180 + offset]];

        const layer = L.polygon(nightPath, {
            fillColor: '#000',
            fillOpacity: 0.3, // 0.7-оос бага зэрэг багасгавал газрын зураг илүү сайн харагдана
            stroke: false,
            interactive: false
        }).addTo(map);

        nightLayers.push(layer);
    });
}

        document.getElementById('hud-time').innerText = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

        // Update Timezone Labels
        labels.forEach(item => {
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const zoneDate = new Date(utc + (3600000 * item.offset));
            const timeStr = zoneDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const dateStr = zoneDate.toLocaleDateString([], { month: 'short', day: 'numeric' });
            const el = document.getElementById(`tz-label-${item.offset}`);
            if (el) {
                el.querySelector('.tz-time').innerText = timeStr;
                el.querySelector('.tz-date').innerText = dateStr;
            }
        });
    }
	
	
	

    initGrid();
    updateClocks();
    updateSolarTerminator();
    setInterval(updateClocks, 1000);
    setInterval(updateSolarTerminator, 1000);
</script>
</body>
</html>
