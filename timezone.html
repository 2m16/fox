		/* TIMEZONE LABEL */
		.tz-dynamic-label {
			background: rgba(10, 15, 20, 0.04); /* Хайрцагны арын өнгө (тунгалаг хар) */
			border: 0px solid #fff;             /* Хүрээний зузаан (0 тул харагдахгүй) */
			color: #fff;                        /* Бичвэрийн үндсэн өнгө (цагаан) */
			padding: 2px 8px;                   /* Дотор талын зай (Дээд-доод, Баруун-зүүн) */
			font-size: 10px;                    /* Үндсэн фонтны хэмжээ */
			border-radius: 2px;                 /* Булангийн бөөрөнхий ирмэг */
			text-align: center;                 /* Бичвэрийг голлуулах */
			display: flex;                      /* Уян хатан бүтэц ашиглах */
			flex-direction: column;             /* Мөрүүдийг дээр дээрээс нь өрөх */
			align-items: center;                /* Мөрүүдийг хэвтээ тэнхлэгт голлуулах */
			min-width: 55px;                    /* Хайрцагны хамгийн бага өргөн */
			transform: translateX(-50%);        /* Байршлыг өөрийнх нь өргөнөөр голлуулж шилжүүлэх */
			backdrop-filter: blur(4px);         /* Ар талын nền-ийг бүрсийлгэх (шил шиг эффект) */
			gap: -2px;                          /* Мөр хоорондын зайг хасах утгаар ойртуулах */
		}

		.tz-row-utc { 
			color: #eedc83;                     /* UTC бичвэрийн өнгө (шар) */
			font-size: 12px;                    /* UTC фонтны хэмжээ */
			line-height: 1.0;                   /* Мөрийн өндрийг шахаж зайг устгах */
		}

		.tz-row-date { 
			color: #f2f2f2;                     /* Огнооны өнгө (цайвар саарал) */
			font-size: 12px;                    /* Огнооны фонтны хэмжээ */
			margin: 0;                          /* Гадна талын зайг бүрэн устгах */
			line-height: 1.0;                   /* Мөрийн өндрийг шахаж зайг устгах */
		}

		.tz-row-time { 
			font-weight: normal;                /* Фонтны зузаан (normal = 400) */
			font-size: 15px;                    /* Цагны фонтны хэмжээ (хамгийн том) */
			color: #5F98D8;                     /* Цагны өнгө (цэнхэр) */
			line-height: 1.0;                   /* Мөрийн өндрийг шахаж зайг устгах */
		}




		


        /* ЗҮҮН ДООД ХҮСНЭГТ */
        #data-table-container {
    		position: absolute;
    		bottom: 20px;
    		left: 20px;
    		z-index: 2000;
    		background: rgba(10, 15, 20, 0.85);
    		border: 1px solid #333;
    		backdrop-filter: blur(5px);

    	/* СКРОЛЛДОХГҮЙ БОЛГОХ ТОХИРГОО */
    		overflow: visible;         /* Доторх зүйл нь ил гарвал контейнер дагаж томорно */
    		height: auto;              /* Өндөр нь мөр нэмэгдэхэд автоматаар сунана */
    		width: fit-content;        /* Өргөн нь багана нэмэгдэхэд баруун тийш сунана */
    		max-height: none;          /* Өндрийн дээд хязгаарыг цуцлах */
		}
		/* ХҮСНЭГТИЙН ФОНТ ХЭМЖЭЭ */
		#info-table {
    		border-collapse: collapse;
    		width: auto;				/* Хүснэгт 100% биш, зөвхөн баганын өргөнөөрөө байна */
    		color: #888;
    		font-size: 12px;			/* хүснэгтийн текстийг бүхэлд нь өөрчлөнө */
    		text-align: left;			/* хүснэгтийн текстийг бүгдийг аль нэг тал руу шахах */
    		white-space: nowrap;		/* Текстүүдийг доошоо таслахгүй, баруун тийш цувуулна */
		}
            
        #info-table th { 
			background: #1a1a1a;
			padding: 5px;
			position: sticky;
			top: 0;
			border: 1px solid #222;
			font-size: 12px;
			color: #888;
			font-weight: bold;
		}
        #info-table td { border: 1px solid #222; padding: 4px; }


		#data-table-container {
			/* ... бусад кодууд ... */
			display: block; /* "display: none" хүснэгт нууна, "display: block" хүснэгт ил гаргана */
		}




        /* БАРУУН ДООД ЦАГ */
        #central-clock-container {
            position: absolute; bottom: 10px; right: 10px; z-index: 1000;
            color: #999999; font-size: 12px; text-align: right;
        }

        .clock-label { font-size: 11px; font-weight: thin; color: #fff; margin-top: 5px; letter-spacing: 2px; }

// 6. TIMEZONE VERTICAL LINE and LABEL
    const tzLayers = [];
    for (let offset = -12; offset <= 12; offset++) {
        const lon = offset * 15;
        L.polyline([[90, lon], [-90, lon]], { color: '#f2f2f2', weight: 0.3, dashArray: '2, 10' }).addTo(map);
        
        const label = L.marker([0, lon], {
            icon: L.divIcon({
                className: 'tz-wrap',
                html: `<div class="tz-dynamic-label">
                    <div class="tz-row-utc">UTC ${offset>=0?'+'+offset:offset}</div>
                    <div class="tz-row-date" id="tz-d-${offset}">--- --</div>
                    <div class="tz-row-time" id="tz-t-${offset}">--:--</div>
                </div>`,
                iconSize: [0, 0]
            })
        }).addTo(map);
        
        tzLayers.push({ offset, label });
    }






// 7. LEFT BOTTOM CORNER TABLE - ШИНЭЧЛЭГДСЭН
	const thr = document.getElementById('table-header');
	thr.innerHTML = ""; // Хуучныг цэвэрлэх
	const headers = ["ID", "LOCATION", "TIME", "PTS", "STATUS", "P-RANK", "NEW Col"]; // Баганын нэрс
	headers.forEach(h => thr.innerHTML += `<th>${h}</th>`);

	// Шинэ мөр нэмдэг функц
	function addRow(dataArray) {
    	const tby = document.getElementById('table-body');
    	const tr = document.createElement('tr');
    	dataArray.forEach(text => {
        	const td = document.createElement('td');
        	td.innerText = text;
        	tr.appendChild(td);

// 8. UPDATE LOOP
    function sync() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        
        map.removeLayer(terminator);
        terminator = L.terminator({ fillOpacity: 0.3, color: '#ffffff', weight: 0.1 }).addTo(map);
        
        const north = map.getBounds().getNorth();
        tzLayers.forEach(tz => {
            const zd = new Date(utc + (3600000 * tz.offset));
            const mon = zd.toLocaleString('en-US', { month: 'short' });
            const day = zd.getDate().toString().padStart(2, '0');
            const tim = zd.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            
            document.getElementById(`tz-d-${tz.offset}`).innerText = `${mon} ${day}`;
            document.getElementById(`tz-t-${tz.offset}`).innerText = tim;






// 9. TIMEZONE LABEL VERTICAL POSITION
	const margin = 1 / Math.pow(2, map.getZoom() - 2); 
        tz.label.setLatLng([north - margin, tz.offset * 15]);
        });

        const p = (n) => n.toString().padStart(2, '0');
        document.getElementById('hud-date').innerText = now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).replace(/\//g, '.');
        document.getElementById('hud-day').innerText = now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
        document.getElementById('hud-time').innerText = `${p(now.getHours())}:${p(now.getMinutes())}`;
    }

    map.on('move zoom', sync);
    setInterval(sync, 1000);
    sync();
